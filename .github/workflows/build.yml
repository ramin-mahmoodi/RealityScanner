name: Build Windows Executable

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup MinGW
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-make

    - name: Configure CMake
      shell: msys2 {0}
      run: cmake -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release

    - name: Build
      shell: msys2 {0}
      run: cmake --build build --config Release

    - name: Strip executable
      shell: msys2 {0}
      run: strip build/RealityScanner.exe

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RealityScanner-Windows
        path: build/RealityScanner.exe

    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v1.0.0"
        name: "RealityScanner v1.0.0"
        files: build/RealityScanner.exe
